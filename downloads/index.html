<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Downloads</title>
  <meta name="description" content="Downloads" />
  <link rel="icon" type="image/svg+xml" href="../assets/img/wisteria-bloom.svg" />
  <link rel="stylesheet" href="../assets/css/site.css" />
</head>
<body data-page="downloads" data-root=".." data-title-key="downloads.title" data-description-key="downloads.description">
  <div id="site-header"></div>
  <main>
    <div class="shell page-stack">
      <section class="hero-panel page-hero">
        <h1 data-i18n="downloads.heroTitle"></h1>
        <p class="lead" data-i18n="downloads.heroBody"></p>
      </section>
      <section class="section-panel">
        <div class="section-head">
          <div>
            <h2 data-i18n="downloads.sectionTitle"></h2>
          </div>
        </div>
        <div class="grid-3">
          <article class="card">
            <div class="card-tag" data-i18n="common.chrome"></div>
            <h3 style="margin-top:14px;" data-i18n="downloads.card1Title"></h3>
            <p data-i18n="downloads.card1Body"></p>
            <div class="button-row">
              <a class="btn-secondary" data-config-href="links.outlineChromeUrl" target="_blank" rel="noopener" data-i18n="common.chromeStore"></a>
            </div>
          </article>
          <article class="card">
            <div class="card-tag" data-i18n="common.extension"></div>
            <h3 style="margin-top:14px;" data-i18n="downloads.card2Title"></h3>
            <p data-i18n="downloads.card2Body"></p>
            <div class="button-row">
              <a class="btn-ghost" data-config-href="links.inboxExtensionUrl" data-i18n="common.comingSoon"></a>
            </div>
          </article>
          <article class="card">
            <div class="card-tag" data-i18n="common.local"></div>
            <h3 style="margin-top:14px;" data-i18n="downloads.card3Title"></h3>
            <p data-i18n="downloads.card3Body"></p>
            <div class="button-row">
              <a class="btn-ghost" data-config-href="links.inboxLocalMacUrl" data-i18n="common.downloadMac"></a>
            </div>
            <p class="muted" data-i18n="common.windowsSoon"></p>
          </article>
        </div>
      </section>
      <section class="section-panel">
        <h2 data-i18n="downloads.notesTitle"></h2>
        <p class="lead" data-i18n="downloads.notesBody"></p>
      </section>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="../assets/data/site.config.js"></script>
  <script src="../assets/data/site.en.js"></script>
  <script src="../assets/data/site.zh.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/site.js"></script>
</body>
</html>
