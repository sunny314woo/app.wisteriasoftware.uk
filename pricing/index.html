<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pricing</title>
  <meta name="description" content="Pricing" />
  <link rel="icon" type="image/svg+xml" href="../assets/img/wisteria-bloom.svg" />
  <link rel="stylesheet" href="../assets/css/site.css" />
</head>
<body data-page="pricing" data-root=".." data-title-key="pricing.title" data-description-key="pricing.description">
  <div id="site-header"></div>
  <main>
    <div class="shell page-stack">
      <section class="hero-panel page-hero">
        <h1 data-i18n="pricing.heroTitle"></h1>
        <p class="lead" data-i18n="pricing.heroBody"></p>
      </section>
      <section class="section-panel">
        <div class="section-head">
          <div>
            <h2 data-i18n="pricing.introTitle"></h2>
            <p class="section-copy" data-i18n="pricing.introBody"></p>
          </div>
        </div>
      </section>
      <section class="section-panel">
        <div class="grid-3">
          <article class="card">
            <div class="card-tag" data-i18n="common.freePlan"></div>
            <h3 style="margin-top:14px;" data-i18n="pricing.freePlanTitle"></h3>
            <p data-i18n="pricing.freePlanBody"></p>
            <ul class="list">
              <li data-i18n="pricing.freePlanFeature1"></li>
              <li data-i18n="pricing.freePlanFeature2"></li>
              <li data-i18n="pricing.freePlanFeature3"></li>
              <li data-i18n="pricing.freePlanFeature4"></li>
            </ul>
          </article>
          <article class="card">
            <div class="card-tag" data-i18n="common.proPlan"></div>
            <h3 style="margin-top:14px;" data-i18n="pricing.planTitle"></h3>
            <p data-i18n="pricing.planBody"></p>
            <div class="price-block">
              <div class="price-stack">
                <div class="price-original" data-i18n="common.originalAnnualPrice"></div>
                <div class="price-row">
                  <div class="price-value">$19</div>
                  <div class="muted" data-i18n="common.annualSuffix"></div>
                </div>
              </div>
            </div>
            <ul class="list">
              <li data-i18n="pricing.proFeature1"></li>
              <li data-i18n="pricing.proFeature2"></li>
              <li data-i18n="pricing.proFeature3"></li>
              <li data-i18n="pricing.proFeature4"></li>
            </ul>
            <div class="button-row">
              <a class="btn" data-config-href="links.suiteCheckoutUrl" data-i18n="common.buyNow"></a>
            </div>
          </article>
          <article class="card">
            <div class="card-tag" data-i18n="common.checkout"></div>
            <h3 style="margin-top:14px;" data-i18n="pricing.checkoutCardTitle"></h3>
            <p data-i18n="pricing.checkoutBody"></p>
            <div class="notice-strip" data-i18n="common.checkoutPlaceholder"></div>
          </article>
          <article class="card">
            <div class="card-tag" data-i18n="common.notes"></div>
            <h3 style="margin-top:14px;" data-i18n="pricing.notesCardTitle"></h3>
            <p data-i18n="pricing.legalBody"></p>
          </article>
          <article class="card">
            <div class="card-tag" data-i18n="common.policy"></div>
            <h3 style="margin-top:14px;" data-i18n="pricing.policyTitle"></h3>
            <p data-i18n="pricing.policyBody"></p>
          </article>
        </div>
      </section>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="../assets/data/site.config.js"></script>
  <script src="../assets/data/site.en.js"></script>
  <script src="../assets/data/site.zh.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/site.js"></script>
</body>
</html>
