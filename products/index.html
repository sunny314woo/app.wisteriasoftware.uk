<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products</title>
  <meta name="description" content="Products" />
  <link rel="icon" type="image/svg+xml" href="../assets/img/wisteria-bloom.svg" />
  <link rel="stylesheet" href="../assets/css/site.css" />
</head>
<body data-page="products" data-root=".." data-title-key="products.title" data-description-key="products.description">
  <div id="site-header"></div>
  <main>
    <div class="shell page-stack">
      <section class="hero-panel page-hero">
        <h1 data-i18n="products.heroTitle"></h1>
        <p class="lead" data-i18n="products.heroBody"></p>
      </section>
      <section class="section-panel">
        <div class="section-head">
          <div>
            <h2 data-i18n="products.sectionTitle"></h2>
          </div>
        </div>
        <div class="grid-3">
          <article class="card">
            <div class="card-tag" data-i18n="common.product01"></div>
            <h3 style="margin-top:14px;" data-i18n="products.card1Title"></h3>
            <p data-i18n="products.card1Body"></p>
            <div class="button-row">
              <a class="btn-secondary" data-config-href="links.outlineChromeUrl" target="_blank" rel="noopener" data-i18n="common.chromeStore"></a>
            </div>
          </article>
          <article class="card">
            <div class="card-tag" data-i18n="common.product02"></div>
            <h3 style="margin-top:14px;" data-i18n="products.card2Title"></h3>
            <p data-i18n="products.card2Body"></p>
            <div class="button-row">
              <a class="btn-ghost" data-config-href="links.inboxExtensionUrl" data-i18n="common.comingSoon"></a>
            </div>
          </article>
          <article class="card">
            <div class="card-tag" data-i18n="common.product03"></div>
            <h3 style="margin-top:14px;" data-i18n="products.card3Title"></h3>
            <p data-i18n="products.card3Body"></p>
            <div class="button-row">
              <a class="btn-ghost" data-config-href="links.inboxLocalMacUrl" data-i18n="common.downloadMac"></a>
            </div>
            <p class="muted" data-i18n="common.windowsSoon"></p>
          </article>
        </div>
      </section>
      <section class="section-panel">
        <div class="section-head">
          <div>
            <h2 data-i18n="products.downloadsTitle"></h2>
            <p class="section-copy" data-i18n="products.downloadsBody"></p>
          </div>
        </div>
        <div class="grid-3">
          <article class="card">
            <h3 data-i18n="products.card1Title"></h3>
            <p data-i18n="products.outlineDownload"></p>
          </article>
          <article class="card">
            <h3 data-i18n="products.card2Title"></h3>
            <p data-i18n="products.extensionDownload"></p>
          </article>
          <article class="card">
            <h3 data-i18n="products.card3Title"></h3>
            <p data-i18n="products.localDownload"></p>
          </article>
        </div>
      </section>

      <section class="section-panel">
        <div class="section-head">
          <div>
            <h2 data-i18n="products.showcaseTitle"></h2>
            <p class="section-copy" data-i18n="products.showcaseBody"></p>
          </div>
        </div>

        <article class="product-showcase">
          <div class="product-showcase-copy">
            <div class="card-tag" data-i18n="common.product01"></div>
            <h3 style="margin-top:14px;" data-i18n="products.card1Title"></h3>
            <p data-i18n="products.showcase1Body"></p>
            <ul class="list compact-list">
              <li data-i18n="products.showcase1Feature1"></li>
              <li data-i18n="products.showcase1Feature2"></li>
              <li data-i18n="products.showcase1Feature3"></li>
            </ul>
          </div>
          <div class="demo-surface demo-outline-nav">
            <div class="demo-window">
              <div class="demo-toolbar">
                <div class="demo-toolbar-chip" data-i18n="demo.pro"></div>
                <div class="demo-toolbar-title" data-i18n="demo.outline"></div>
                <div class="demo-toolbar-chip" data-i18n="demo.jumpLinks"></div>
              </div>
              <div class="demo-outline-layout">
                <aside class="demo-outline-rail">
                  <div class="demo-rail-title" data-i18n="demo.toc"></div>
                  <div class="demo-number-item">1</div>
                  <div class="demo-number-item">2</div>
                  <div class="demo-number-item is-active">3</div>
                  <div class="demo-number-item">4</div>
                  <div class="demo-number-item">5</div>
                </aside>
                <div class="demo-outline-main">
                  <div class="demo-heading" data-i18n="products.showcase1Heading"></div>
                  <div class="demo-line" style="width: 84%;"></div>
                  <div class="demo-line" style="width: 92%;"></div>
                  <div class="demo-line" style="width: 88%;"></div>
                  <div class="demo-image-banner"></div>
                  <div class="demo-line" style="width: 90%;"></div>
                  <div class="demo-line" style="width: 76%;"></div>
                </div>
              </div>
            </div>
          </div>
        </article>

        <article class="product-showcase">
          <div class="product-showcase-copy">
            <div class="card-tag" data-i18n="common.product02"></div>
            <h3 style="margin-top:14px;" data-i18n="products.card2Title"></h3>
            <p data-i18n="products.showcase2Body"></p>
            <ul class="list compact-list">
              <li data-i18n="products.showcase2Feature1"></li>
              <li data-i18n="products.showcase2Feature2"></li>
              <li data-i18n="products.showcase2Feature3"></li>
            </ul>
          </div>
          <div class="demo-surface demo-split">
            <div class="demo-window">
              <div class="demo-toolbar">
                <div class="demo-dots">
                  <span class="demo-dot"></span>
                  <span class="demo-dot"></span>
                  <span class="demo-dot"></span>
                </div>
                <div class="demo-toolbar-title" data-i18n="demo.chatgpt"></div>
                <div class="demo-toolbar-chip" data-i18n="demo.outline"></div>
              </div>
              <div class="demo-chat-layout">
                <div class="demo-conversation">
                  <div class="demo-pill" data-i18n="home.storyTag1"></div>
                  <div class="demo-heading" data-i18n="products.showcase2Heading"></div>
                  <div class="demo-line" style="width: 86%;"></div>
                  <div class="demo-line" style="width: 93%;"></div>
                  <div class="demo-line" style="width: 74%;"></div>
                  <div class="demo-bubble-row">
                    <div class="demo-bubble" data-i18n="demo.import"></div>
                    <div class="demo-bubble" data-i18n="demo.preview"></div>
                  </div>
                  <div class="demo-card-block">
                    <div class="demo-subtitle" data-i18n="demo.markdown"></div>
                    <div class="demo-line" style="width: 90%;"></div>
                    <div class="demo-line" style="width: 78%;"></div>
                    <div class="demo-line" style="width: 68%;"></div>
                  </div>
                </div>
                <aside class="demo-sidepanel">
                  <div class="demo-sidehead">
                    <strong data-i18n="demo.inboxMd"></strong>
                    <span class="demo-toolbar-chip" data-i18n="demo.preview"></span>
                  </div>
                  <div class="demo-tabs">
                    <span class="demo-mini-tab is-active" data-i18n="demo.inbox"></span>
                    <span class="demo-mini-tab" data-i18n="demo.edit"></span>
                  </div>
                  <div class="demo-card-block">
                    <div class="demo-subtitle" data-i18n="demo.summary"></div>
                    <div class="demo-line" style="width: 94%;"></div>
                    <div class="demo-line" style="width: 86%;"></div>
                    <div class="demo-line" style="width: 72%;"></div>
                  </div>
                  <div class="demo-action-row">
                    <span class="demo-badge" data-i18n="demo.import"></span>
                    <span class="demo-badge demo-badge-accent" data-i18n="demo.aiSummary"></span>
                  </div>
                </aside>
              </div>
            </div>
          </div>
        </article>

        <article class="product-showcase">
          <div class="product-showcase-copy">
            <div class="card-tag" data-i18n="common.product03"></div>
            <h3 style="margin-top:14px;" data-i18n="products.card3Title"></h3>
            <p data-i18n="products.showcase3Body"></p>
            <ul class="list compact-list">
              <li data-i18n="products.showcase3Feature1"></li>
              <li data-i18n="products.showcase3Feature2"></li>
              <li data-i18n="products.showcase3Feature3"></li>
            </ul>
          </div>
          <div class="demo-surface demo-local">
            <div class="demo-window">
              <div class="demo-toolbar">
                <div class="demo-toolbar-title" data-i18n="demo.inboxMd"></div>
                <div class="demo-toolbar-actions">
                  <span class="demo-toolbar-chip" data-i18n="demo.import"></span>
                  <span class="demo-toolbar-chip" data-i18n="demo.aiSummary"></span>
                </div>
              </div>
              <div class="demo-local-layout">
                <aside class="demo-left-rail">
                  <div class="demo-rail-card">
                    <div class="demo-subtitle" data-i18n="demo.filters"></div>
                    <div class="demo-filter-label" data-i18n="demo.source"></div>
                    <div class="demo-select"></div>
                    <div class="demo-filter-label" data-i18n="demo.type"></div>
                    <div class="demo-select"></div>
                    <div class="demo-filter-label" data-i18n="demo.time"></div>
                    <div class="demo-select"></div>
                  </div>
                  <div class="demo-rail-card">
                    <div class="demo-subtitle" data-i18n="demo.toc"></div>
                    <div class="demo-toc-item is-active"></div>
                    <div class="demo-toc-item"></div>
                    <div class="demo-toc-item"></div>
                  </div>
                </aside>
                <div class="demo-main-panel">
                  <div class="demo-content-head">
                    <div>
                      <div class="demo-heading" data-i18n="products.showcase3Heading"></div>
                      <div class="demo-meta-row">
                        <span class="demo-meta-chip" data-i18n="demo.localReview"></span>
                        <span class="demo-meta-chip" data-i18n="demo.markdown"></span>
                      </div>
                    </div>
                    <span class="demo-badge demo-badge-accent" data-i18n="demo.aiSummary"></span>
                  </div>
                  <div class="demo-summary-card">
                    <div class="demo-subtitle" data-i18n="demo.summary"></div>
                    <div class="demo-line" style="width: 92%;"></div>
                    <div class="demo-line" style="width: 96%;"></div>
                    <div class="demo-line" style="width: 82%;"></div>
                    <div class="demo-line" style="width: 88%;"></div>
                  </div>
                  <div class="demo-image-card"></div>
                </div>
              </div>
            </div>
          </div>
        </article>
      </section>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="../assets/data/site.config.js"></script>
  <script src="../assets/data/site.en.js"></script>
  <script src="../assets/data/site.zh.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/site.js"></script>
</body>
</html>
